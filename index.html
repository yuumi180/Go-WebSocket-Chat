<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>shiyumi 的聊天室</title>
    <link rel="icon" href="/favicon.png" type="image/png">

    <style>        /* 全局样式 */
    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #71b7e6, #9b59b6);
        overflow: hidden;
    }

    /* 基础响应式布局 */
    @media (max-width: 768px) {
        #chat-page {
            width: 100%;
            height: 100vh;
            border-radius: 0;
            position: relative;
        }

        .user-list-container {
            position: absolute;
            left: -100%;
            top: 0;
            width: 250px;
            height: 100%;
            transition: left 0.3s ease;
            z-index: 100;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
        }

        .user-list-container.show {
            left: 0;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }

        .sidebar-overlay.show {
            display: block;
        }

        .mobile-menu-btn {
            display: block !important;
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 101;
            background: #9b59b6;
            border: none;
            border-radius: 5px;
            padding: 8px 12px;
            color: white;
            cursor: pointer;
            font-size: 20px;
        }

        #chat-title {
            padding-left: 60px !important;
        }

        .message {
            max-width: 85% !important;
        }

        #input-area {
            padding: 10px !important;
        }

        #message-input {
            font-size: 16px !important;
        }
    }

    @media (max-width: 480px) {
        .message {
            max-width: 90% !important;
        }

        #send-button {
            min-width: 60px !important;
            font-size: 13px !important;
        }

        #clear-chat-btn {
            display: none;
        }
    }

    /* 桌面端隐藏菜单按钮 */
    @media (min-width: 769px) {
        .mobile-menu-btn {
            display: none !important;
        }
    }

    /* 新增：通知动画 */
    @keyframes slideIn {
        from {
            transform: translateX(100%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }

    .notification {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 25px;
        background: #333;
        color: white;
        border-radius: 5px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        z-index: 10000;
        animation: slideIn 0.3s ease-out;
        max-width: 300px;
    }

    @media (max-width: 768px) {
        .notification {
            top: 10px;
            right: 10px;
            left: 10px;
            max-width: none;
        }
    }

    .notification.success {
        background: #28a745;
    }

    .notification.error {
        background: #dc3545;
    }

    .notification.info {
        background: #17a2b8;
    }

    /* 新增：加载动画 */
    .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #9b59b6;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* 新增：消息已读标记 */
    .message.read {
        opacity: 0.7;
    }

    .message.unread {
        position: relative;
    }

    .message.unread::before {
        content: '';
        position: absolute;
        left: -5px;
        top: 50%;
        transform: translateY(-50%);
        width: 3px;
        height: 70%;
        background: #007bff;
        border-radius: 2px;
    }

    /* 新增：@提及样式 */
    .mention {
        color: #007bff;
        font-weight: bold;
        cursor: pointer;
    }

    .mention:hover {
        text-decoration: underline;
    }

    /* 认证页面容器 */
    #auth-page {
        width: 360px;
        padding: 40px;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    @media (max-width: 480px) {
        #auth-page {
            width: 90%;
            padding: 20px;
        }
    }

    #auth-page h2 {
        margin-bottom: 25px;
        color: #333;
        padding: 0;
        border: none;
        font-size: 24px;
    }
    #auth-page input[type="text"], #auth-page input[type="password"] {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
        height: auto;
        font-size: 14px;
    }
    #auth-page button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 5px;
        background-color: #9b59b6;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s;
    }
    #auth-page button:hover {
        background-color: #8e44ad;
    }
    .toggle-form {
        color: #007bff;
        cursor: pointer;
        margin-top: 20px;
        display: inline-block;
        font-size: 14px;
    }
    .toggle-form:hover {
        text-decoration: underline;
    }

    /* 聊天主页面容器 */
    #chat-page {
        display: none;
        width: 90%;
        max-width: 1200px;
        height: 90vh;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        position: relative;
    }

    /* 用户列表区域 */
    .user-list-container {
        width: 200px;
        border-right: 1px solid #eee;
        padding: 20px;
        background-color: #f8f9fa;
        overflow-y: auto;
        flex-shrink: 0;
        transition: all 0.3s ease;
    }

    @media (max-width: 768px) {
        .user-list-container {
            width: 100%;
            border-right: none;
            border-bottom: 1px solid #eee;
            padding: 15px;
        }
    }

    .user-list-container h2 {
        font-size: 18px;
        margin-top: 0;
        padding-bottom: 10px;
        color: #333;
        border-bottom: 1px solid #ddd;
    }
    #user-list {
        list-style-type: none;
        padding: 0;
        margin: 0;
    }
    #user-list li {
        padding: 10px 5px;
        border-bottom: 1px solid #eee;
        color: #555;
        cursor: pointer;
        transition: background-color 0.2s;
        word-break: break-all;
        display: flex;
        align-items: center;
    }
    #user-list li:hover {
        background-color: #e9ecef;
    }
    #user-list li.active {
        background-color: #d4edda;
        font-weight: bold;
    }
    .status-dot {
        height: 8px;
        width: 8px;
        border-radius: 50%;
        margin-right: 10px;
        flex-shrink: 0;
    }
    .status-dot.online {
        background-color: #28a745;
    }
    .status-dot.offline {
        background-color: #ccc;
    }

    /* 聊天区域 */
    .chat-container {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        position: relative;
    }
    .chat-container h2 {
        margin: 0;
        padding: 20px 20px 10px;
        border-bottom: 1px solid #eee;
        font-size: 20px;
    }

    @media (max-width: 768px) {
        .chat-container h2 {
            padding: 15px 15px 10px 50px;
            font-size: 18px;
        }
    }

    #typing-indicator {
        height: 20px;
        padding: 0 20px;
        font-style: italic;
        color: #999;
        font-size: 12px;
    }
    #messages {
        flex-grow: 1;
        overflow-y: auto;
        padding: 20px;
        background: #fafafa;
    }

    @media (max-width: 768px) {
        #messages {
            padding: 15px;
        }
    }

    .message {
        margin-bottom: 15px;
        line-height: 1.4;
        max-width: 80%;
        display: flex;
        flex-direction: column;
        animation: messageSlide 0.3s ease-out;
    }

    @keyframes messageSlide {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .message .sender {
        font-weight: bold;
        color: #333;
        font-size: 12px;
        margin-bottom: 4px;
    }
    .message .content-wrapper {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 18px;
        background-color: #f1f0f0;
        text-align: left;
        word-break: break-all;
        align-self: flex-start;
    }
    .message .timestamp {
        font-size: 10px;
        color: #aaa;
        margin-top: 4px;
    }
    .message .content-wrapper img {
        max-width: 100%;
        max-height: 200px;
        border-radius: 10px;
        display: block;
    }

    .system-message {
        color: #999; font-style: italic; text-align: center; font-size: 12px; width: 100%; max-width: 100%;
    }

    .my-message {
        align-items: flex-end; margin-left: auto;
    }
    .my-message .content-wrapper {
        background-color: #007bff; color: white; align-self: flex-end;
    }
    .my-message .sender { display: none; }

    #input-area {
        display: flex;
        padding: 15px;
        background-color: #f8f9fa;
        border-top: 1px solid #eee;
        align-items: center;
    }

    @media (max-width: 768px) {
        #input-area {
            padding: 10px;
            flex-wrap: wrap;
        }
    }

    #message-input, #send-button {
        height: 40px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
    }
    #message-input {
        flex-grow: 1;
        margin-right: 10px;
        resize: none;
        padding: 0 10px;
    }

    @media (max-width: 768px) {
        #message-input {
            width: calc(100% - 120px);
            order: 2;
        }
    }

    #send-button {
        width: 80px;
        flex-shrink: 0;
        padding: 0;
        background-color: #9b59b6;
        color: #fff;
        border-color: #9b59b6;
    }

    @media (max-width: 480px) {
        #send-button {
            width: 60px;
            font-size: 13px;
        }
    }

    #send-button:hover {
        background-color: #8e44ad;
    }
    .image-upload-label {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        cursor: pointer;
        margin-right: 10px;
    }
    .image-upload-label svg {
        color: #555;
        transition: color 0.2s;
    }
    .image-upload-label:hover svg {
        color: #007bff;
    }

    /* 新增：未读消息计数 */
    .unread-badge {
        background: #dc3545;
        color: white;
        border-radius: 10px;
        padding: 2px 6px;
        font-size: 11px;
        margin-left: 5px;
    }

    /* 管理员和资料按钮响应式 */
    #admin-panel, .profile-section {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid #ddd;
    }

    #admin-users-btn, #profile-btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        transition: opacity 0.2s;
    }

    #admin-users-btn:active, #profile-btn:active {
        opacity: 0.8;
    }
    </style>
</head>
<body>
<div id="auth-page">
    <div class="auth-container">
        <div id="login-form">
            <h2>登录</h2>
            <input type="text" id="login-username" placeholder="用户名" autocomplete="username">
            <input type="password" id="login-password" placeholder="密码" autocomplete="current-password">
            <button id="login-button">登录</button>
            <p>没有账号？ <span class="toggle-form" onclick="toggleForms()">立即注册</span></p>
        </div>
        <div id="register-form" style="display: none;">
            <h2>注册</h2>
            <input type="text" id="register-username" placeholder="用户名">
            <input type="password" id="register-password" placeholder="密码">
            <button id="register-button">注册</button>
            <p>已有账号？ <span class="toggle-form" onclick="toggleForms()">立即登录</span></p>
        </div>
    </div>
</div>
<div id="chat-page">
    <!-- 移动端菜单按钮 -->
    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>

    <!-- 侧边栏遮罩层 -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="user-list-container" id="user-list-container">
        <h2>在线用户</h2>
        <ul id="user-list"></ul>

        <!-- 管理员入口 -->
        <div id="admin-panel" style="display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd;">
            <button id="admin-users-btn" style="width: 100%; padding: 10px; background-color: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px;">
                👑 用户管理
            </button>
        </div>

        <!-- 个人资料入口 -->
        <div class="profile-section" style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd;">
            <button id="profile-btn" style="width: 100%; padding: 10px; background-color: #17a2b8; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px;">
                👤 个人资料
            </button>
        </div>
    </div>
    <div class="chat-container">
        <h2 id="chat-title"></h2>
        <div id="typing-indicator" class="typing-indicator"></div>
        <div id="messages"></div>
        <div id="input-area">
            <button id="clear-chat-btn" style="padding: 8px 15px; background-color: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; margin-right: 10px;" title="清空当前聊天记录">
                🗑️ 清空聊天
            </button>
            <label for="image-input" class="image-upload-label">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            </label>
            <input type="file" id="image-input" accept="image/*" style="display: none;">
            <input type="text" id="message-input" placeholder="输入消息...">
            <button id="send-button">发送</button>
        </div>
    </div>

    <!-- 管理员面板模态框 -->
    <div id="admin-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; border-radius: 10px; padding: 20px; width: 800px; max-width: 90%; max-height: 80vh; overflow-y: auto; position: relative;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #eee;">
                <h2 style="margin: 0; color: #333;">👑 用户管理</h2>
                <button id="close-admin-modal" style="background: none; border: none; font-size: 28px; cursor: pointer; color: #999;">&times;</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="admin-users-table" style="width: 100%; border-collapse: collapse;">
                    <thead>
                    <tr style="background: #f8f9fa; border-bottom: 2px solid #dee2e6;">
                        <th style="padding: 12px; text-align: left;">ID</th>
                        <th style="padding: 12px; text-align: left;">用户名</th>
                        <th style="padding: 12px; text-align: left;">角色</th>
                        <th style="padding: 12px; text-align: left;">注册时间</th>
                        <th style="padding: 12px; text-align: left;">状态</th>
                        <th style="padding: 12px; text-align: left;">操作</th>
                    </tr>
                    </thead>
                    <tbody id="admin-users-tbody">
                    <!-- 动态填充 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 个人资料编辑模态框 -->
    <div id="profile-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; border-radius: 10px; padding: 20px; width: 500px; max-width: 90%; position: relative;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #eee;">
                <h2 style="margin: 0; color: #333;">👤 个人资料</h2>
                <button id="close-profile-modal" style="background: none; border: none; font-size: 28px; cursor: pointer; color: #999;">&times;</button>
            </div>
            <form id="profile-form">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #555;">用户名</label>
                    <input type="text" id="profile-username" readonly style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; background: #f8f9fa;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #555;">昵称</label>
                    <input type="text" id="profile-nickname" placeholder="请输入昵称" maxlength="50" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #555;">年龄</label>
                    <input type="number" id="profile-age" placeholder="请输入年龄" min="1" max="150" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #555;">性别</label>
                    <select id="profile-sex" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                        <option value="">请选择</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #555;">地址</label>
                    <input type="text" id="profile-address" placeholder="请输入地址" maxlength="255" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <button type="submit" style="width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">保存修改</button>
            </form>
        </div>
    </div>

</div>

<script>    // ... existing code ...

// --- DOM 元素获取 ---
const authPage = document.getElementById('auth-page');
const chatPage = document.getElementById('chat-page');
const loginForm = document.getElementById('login-form');
const registerForm = document.getElementById('register-form');
const loginBtn = document.getElementById('login-button');
const registerBtn = document.getElementById('register-button');
const messagesDiv = document.getElementById('messages');
const messageInput = document.getElementById('message-input');
const sendButton = document.getElementById('send-button');
const userListUl = document.getElementById('user-list');
const chatTitle = document.getElementById('chat-title');
const typingIndicator = document.getElementById('typing-indicator');
const imageInput = document.getElementById('image-input');
const clearChatBtn = document.getElementById('clear-chat-btn');
const userListContainer = document.getElementById('user-list-container');

    // === 全局状态 ===
    let socket;
    let currentUsername;
    let currentChatTarget = null;
    let allUsers = [];
    let onlineUsers = [];
    let allMessages = [];
    let typingTimer;
    let isAdmin = localStorage.getItem('isAdmin') === 'true' || false;
    let unreadCounts = {}; // 新增：未读消息计数

    // === 工具函数 ===
    // 新增：移动端侧边栏切换函数
    function toggleSidebar() {
        userListContainer.classList.toggle('show');
        const overlay = document.querySelector('.sidebar-overlay');
        overlay.classList.toggle('show');
    }

    // 新增：点击用户列表项后自动关闭侧边栏（移动端）
    function handleUserListClick() {
        if (window.innerWidth <= 768) {
            toggleSidebar();
        }
    }

    // 新增：显示通知
    function showNotification(message, type = 'info') {
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.textContent = message;
        document.body.appendChild(notification);

        setTimeout(() => {
            notification.style.animation = 'slideIn 0.3s reverse';
            setTimeout(() => notification.remove(), 300);
        }, 3000);
    }

    // 新增：表情符号转换 - 修复版本
    function replaceEmojis(text) {
        // 只在明确是表情符号模式时才替换
        const emojiPatterns = [
            { pattern: /:\)/g, emoji: '😊' },
            { pattern: /:\(/g, emoji: '😢' },
            { pattern: /:D/g, emoji: '😄' },
            { pattern: /;\)/g, emoji: '😉' },
            { pattern: /:P/g, emoji: '😜' },
            { pattern: /<3/g, emoji: '❤️' },
            { pattern: /:o/gi, emoji: '😮' },
            { pattern: /:\|/g, emoji: '😐' }
        ];

        let result = text;
        for (const { pattern, emoji } of emojiPatterns) {
            result = result.replace(pattern, emoji);
        }
        return result;
    }

    // 新增：XSS 防护
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // === 认证逻辑 ===
    function toggleForms() {
        loginForm.style.display = loginForm.style.display === 'none' ? 'block' : 'none';
        registerForm.style.display = registerForm.style.display === 'none' ? 'block' : 'none';
    }
    registerBtn.addEventListener('click', async () => {
        const user = document.getElementById('register-username').value.trim();
        const pass = document.getElementById('register-password').value;
        if (!user || !pass) {
            showNotification('用户名和密码不能为空', 'error');
            return;
        }
        if (user.length < 3) {
            showNotification('用户名至少 3 个字符', 'error');
            return;
        }
        if (pass.length < 6) {
            showNotification('密码至少 6 个字符', 'error');
            return;
        }
        try {
            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            if (response.status === 201) {
                showNotification('注册成功！请登录', 'success');
                toggleForms();
            } else {
                showNotification('注册失败：' + await response.text(), 'error');
            }
        } catch (error) {
            showNotification('注册请求失败：' + error.message, 'error');
        }
    });

    loginBtn.addEventListener('click', async () => {
        const user = document.getElementById('login-username').value.trim();
        const pass = document.getElementById('login-password').value;
        if (!user || !pass) {
            showNotification('用户名和密码不能为空', 'error');
            return;
        }
        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            if (response.ok) {
                const data = await response.json();
                currentUsername = user;
                isAdmin = data.isAdmin || false;
                localStorage.setItem('token', data.token);
                localStorage.setItem('isAdmin', isAdmin.toString());
                console.log('登录成功，isAdmin:', isAdmin);
                showNotification('欢迎回来，' + user + '！', 'success');
                connectWebSocket(data.token);
            } else {
                showNotification('登录失败：' + await response.text(), 'error');
            }
        } catch (error) {
            showNotification('登录请求失败：' + error.message, 'error');
        }
    });

    // === WebSocket 连接逻辑 ===
    let reconnectAttempts = 0;
    const MAX_RECONNECT_ATTEMPTS = 5;
    const RECONNECT_DELAY = 3000;

    function connectWebSocket(token) {
        authPage.style.display = 'none';
        chatPage.style.display = 'flex';
        allMessages = [];

        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsHost = window.location.host;
        socket = new WebSocket(`${wsProtocol}//${wsHost}/ws?token=${token}`);

        socket.onopen = () => {
            reconnectAttempts = 0; // 重置重连计数
            selectChatTarget(null);
            addMessageToCacheAndRender({ type: 'system', content: '成功连接到聊天室！', timestamp: new Date().toISOString() });

            // 显示管理员面板（如果是管理员）
            const adminPanel = document.getElementById('admin-panel');
            if (isAdmin) {
                adminPanel.style.display = 'block';
            } else {
                adminPanel.style.display = 'none';
            }
        };

        socket.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'user_list') {
                allUsers = msg.all_users || [];
                onlineUsers = msg.user_list || [];
                console.log('收到用户列表更新:', onlineUsers);
                updateUserListDOM();
            } else if (msg.type === 'typing') {
                if (msg.sender === currentChatTarget) {
                    typingIndicator.textContent = `${msg.sender} 正在输入...`;
                }
            } else if (msg.type === 'stop_typing') {
                if (msg.sender === currentChatTarget) {
                    typingIndicator.textContent = '';
                }
            } else {
                if (msg.sender === currentChatTarget || (msg.type === 'private' && msg.to === currentUsername) || msg.type === 'broadcast' || msg.type === 'system') {
                    typingIndicator.textContent = '';
                }

                // 新增：如果是私信且不是当前聊天对象，增加未读计数
                if (msg.type === 'private' && msg.to === currentUsername && msg.sender !== currentChatTarget) {
                    if (!unreadCounts[msg.sender]) {
                        unreadCounts[msg.sender] = 0;
                    }
                    unreadCounts[msg.sender]++;
                    updateUserListWithUnreadBadge(msg.sender);

                    // 浏览器通知
                    if (Notification.permission === 'granted') {
                        new Notification('新消息来自 ' + msg.sender, {
                            body: msg.contentType === 'image' ? '📷 图片消息' : msg.content,
                            icon: '/favicon.ico'
                        });
                    }
                }

                addMessageToCacheAndRender(msg);
            }
        };

        socket.onclose = () => {
            addMessageToCacheAndRender({ type: 'system', content: '连接已断开！正在尝试重连...', timestamp: new Date().toISOString() });

            if (adminPanelRefreshInterval) {
                clearInterval(adminPanelRefreshInterval);
                adminPanelRefreshInterval = null;
            }

            // 自动重连机制
            if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                reconnectAttempts++;
                const delay = RECONNECT_DELAY * reconnectAttempts; // 指数退避

                setTimeout(() => {
                    const storedToken = localStorage.getItem('token');
                    if (storedToken) {
                        connectWebSocket(storedToken);
                    } else {
                        location.reload();
                    }
                }, delay);
            } else {
                // 超过最大重连次数，返回登录页
                setTimeout(() => {
                    localStorage.removeItem('token');
                    localStorage.removeItem('isAdmin');
                    location.reload();
                }, 2000);
            }
        };

        socket.onerror = (error) => {
            console.error('WebSocket Error:', error);
            addMessageToCacheAndRender({ type: 'system', content: '连接出错！', timestamp: new Date().toISOString() });
        };
    }

    // === 消息发送与输入事件监听 ===
    sendButton.addEventListener('click', () => sendTextMessage());
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendTextMessage();
        }
    });
    messageInput.addEventListener('input', () => {
        if (currentChatTarget && socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ type: 'typing', to: currentChatTarget, sender: currentUsername }));
        }
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => {
            if (currentChatTarget && socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'stop_typing', to: currentChatTarget, sender: currentUsername }));
            }
        }, 1500);
    });
    imageInput.addEventListener('change', (event) => {
        const file = event.target.files[0];
        if (file && socket && socket.readyState === WebSocket.OPEN) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const message = {
                    type: currentChatTarget ? 'private' : 'broadcast',
                    to: currentChatTarget,
                    sender: currentUsername,
                    content: e.target.result,
                    contentType: 'image'
                };
                socket.send(JSON.stringify(message));
            };
            reader.readAsDataURL(file);
        }
        event.target.value = null;
    });

    function sendTextMessage() {
        const content = messageInput.value;
        if (content.trim()) {
            const message = {
                type: currentChatTarget ? 'private' : 'broadcast',
                to: currentChatTarget,
                sender: currentUsername,
                content: content,
                contentType: 'text'
            };
            socket.send(JSON.stringify(message));
            messageInput.value = '';
        }
    }

    // === 核心渲染流程 ===
    function addMessageToCacheAndRender(msg) {
        allMessages.push(msg);
        renderMessages();
    }

    function renderMessages() {
        messagesDiv.innerHTML = '';
        const messagesToRender = allMessages.filter(msg => {
            if (msg.type === 'system') return true;
            if (currentChatTarget === null) {
                return msg.type === 'broadcast';
            } else {
                return msg.type === 'private' && ((msg.sender === currentUsername && msg.to === currentChatTarget) || (msg.to === currentUsername && msg.sender === currentChatTarget));
            }
        });
        messagesToRender.forEach(msg => addMessageToDOM(msg));
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addMessageToDOM(msg) {
        const msgElement = document.createElement('div');
        msgElement.classList.add('message');
        let timeString = '';
        if (msg.timestamp) {
            const date = new Date(msg.timestamp);
            timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        if (msg.type === 'system') {
            msgElement.classList.add('system-message');
            msgElement.textContent = `[系统消息]: ${msg.content} (${timeString})`;
        } else {
            if (msg.sender === currentUsername) {
                msgElement.classList.add('my-message');
            }

            // 新增：检查是否是未读消息
            if (msg.type === 'private' && msg.to === currentUsername && msg.sender !== currentUsername) {
                msgElement.classList.add('unread');
            }

            let senderText = msg.sender;
            if (msg.type === 'private') {
                senderText += (msg.sender === currentUsername) ? ` (私信 to ${msg.to})` : ' (私信)';
            }

            const contentWrapper = document.createElement('div');
            contentWrapper.className = 'content-wrapper';

            if (msg.contentType === 'image') {
                const img = document.createElement('img');
                img.src = msg.content;
                img.alt = `Image from ${msg.sender}`;
                img.onclick = () => window.open(msg.content);
                contentWrapper.appendChild(img);
            } else {
                // 使用 textContent 而不是 innerHTML，避免浏览器自动替换
                const span = document.createElement('span');
                span.textContent = msg.content;
                contentWrapper.appendChild(span);
            }

            msgElement.innerHTML = `
                <div class="sender">${escapeHtml(senderText)}</div>
                <div class="timestamp">${timeString}</div>
            `;
            msgElement.insertBefore(contentWrapper, msgElement.querySelector('.timestamp'));
        }
        messagesDiv.appendChild(msgElement);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function updateUserListDOM() {
        userListUl.innerHTML = '';
        const groupChatElement = document.createElement('li');
        groupChatElement.textContent = '群聊大厅';
        groupChatElement.onclick = () => {
            selectChatTarget(null);
            handleUserListClick();
        };
        userListUl.appendChild(groupChatElement);
        const onlineUserSet = new Set(onlineUsers);
        allUsers.sort();
        allUsers.forEach(user => {
            if (user === currentUsername) return;
            const userElement = document.createElement('li');
            userElement.onclick = () => {
                selectChatTarget(user);
                handleUserListClick();
            };
            const statusDot = document.createElement('span');
            statusDot.classList.add('status-dot');
            if (onlineUserSet.has(user)) {
                statusDot.classList.add('online');
            } else {
                statusDot.classList.add('offline');
            }
            const userNameText = document.createTextNode(user);
            userElement.appendChild(statusDot);
            userElement.appendChild(userNameText);
            userListUl.appendChild(userElement);
        });
        highlightCurrentChat();

        // 同步更新管理员面板的在线状态
        updateAdminPanelOnlineStatus();
    }

    // 更新管理员面板中的在线状态
    function updateAdminPanelOnlineStatus() {
        const adminModal = document.getElementById('admin-modal');
        if (adminModal.style.display !== 'flex') {
            return; // 如果管理面板没打开，就不更新
        }

        const onlineUserSet = new Set(onlineUsers);
        const rows = document.querySelectorAll('#admin-users-tbody tr');

        console.log('更新在线状态，当前在线用户:', onlineUsers); // 调试信息

        rows.forEach(row => {
            const username = row.cells[1].textContent;
            const statusCell = row.cells[4];
            const isOnline = onlineUserSet.has(username);

            console.log(`用户 ${username}: ${isOnline ? '在线' : '离线'}`); // 调试信息

            statusCell.innerHTML = `
                <span style="color: ${isOnline ? '#28a745' : '#6c757d'}; font-weight: bold;">
                    ${isOnline ? '● 在线' : '○ 离线'}
                </span>
            `;
        });
    }

    function selectChatTarget(target) {
        currentChatTarget = target;
        chatTitle.textContent = target ? `与 ${target} 私聊中` : '群聊大厅';
        typingIndicator.textContent = '';

        // 新增：清除未读计数
        if (target && unreadCounts[target]) {
            unreadCounts[target] = 0;
            delete unreadCounts[target]; // 完全删除这个键
        }

        highlightCurrentChat();
        renderMessages();

        // 新增：重新渲染用户列表，移除未读徽章
        updateUserListDOM();
    }

    function highlightCurrentChat() {
        document.querySelectorAll('#user-list li').forEach(li => {
            li.classList.remove('active');
            if ((currentChatTarget === null && li.textContent === '群聊大厅') || (li.textContent.endsWith(currentChatTarget))) {
                li.classList.add('active');
            }
        });
    }

    // 新增：在用户列表中显示未读徽章
    function updateUserListWithUnreadBadge(username) {
        const userElements = document.querySelectorAll('#user-list li');
        userElements.forEach(li => {
            if (li.textContent.includes(username)) {
                const count = unreadCounts[username] || 0;
                if (count > 0) {
                    let badge = li.querySelector('.unread-badge');
                    if (!badge) {
                        badge = document.createElement('span');
                        badge.className = 'unread-badge';
                        li.appendChild(badge);
                    }
                    badge.textContent = count;
                }
            }
        });
    }

    // === 管理员功能 ===
    const adminUsersBtn = document.getElementById('admin-users-btn');
    const adminModal = document.getElementById('admin-modal');
    const closeAdminModal = document.getElementById('close-admin-modal');
    const adminUsersTbody = document.getElementById('admin-users-tbody');
    let adminPanelRefreshInterval = null;
    let adminPanelLoaded = false;

    // === 个人资料功能 ===
    const profileBtn = document.getElementById('profile-btn');
    const profileModal = document.getElementById('profile-modal');
    const closeProfileModal = document.getElementById('close-profile-modal');
    const profileForm = document.getElementById('profile-form');
    const profileUsername = document.getElementById('profile-username');
    const profileNickname = document.getElementById('profile-nickname');
    const profileAge = document.getElementById('profile-age');
    const profileSex = document.getElementById('profile-sex');
    const profileAddress = document.getElementById('profile-address');

    // 打开个人资料面板
    profileBtn.addEventListener('click', async () => {
        profileModal.style.display = 'flex';
        await loadProfile();
    });

    // 关闭个人资料面板
    closeProfileModal.addEventListener('click', () => {
        profileModal.style.display = 'none';
    });

    // 点击模态框外部关闭
    profileModal.addEventListener('click', (e) => {
        if (e.target === profileModal) {
            profileModal.style.display = 'none';
        }
    });

    // 加载个人资料
    async function loadProfile() {
        const token = localStorage.getItem('token') || '';
        try {
            const response = await fetch(`/user/profile?token=${token}`, {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' }
            });

            if (!response.ok) {
                throw new Error('加载个人资料失败');
            }

            const profile = await response.json();
            profileUsername.value = profile.username;
            profileNickname.value = profile.nickname || '';
            profileAge.value = profile.age || '';
            profileSex.value = profile.sex || '';
            profileAddress.value = profile.address || '';
        } catch (error) {
            showNotification('加载个人资料失败：' + error, 'error');
        }
    }

    // 保存个人资料
    profileForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const token = localStorage.getItem('token') || '';
        const profileData = {
            nickname: profileNickname.value,
            age: parseInt(profileAge.value) || 0,
            sex: profileSex.value,
            address: profileAddress.value
        };

        try {
            const response = await fetch(`/user/update-profile?token=${token}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(profileData)
            });

            if (!response.ok) {
                throw new Error('保存失败');
            }

            showNotification('✅ 个人资料已保存', 'success');
            profileModal.style.display = 'none';
        } catch (error) {
            showNotification('保存失败：' + error, 'error');
        }
    });

    // 打开管理员面板
    adminUsersBtn.addEventListener('click', async () => {
        // 双重检查：确保只有管理员才能打开
        if (!isAdmin) {
            alert('只有管理员才能访问用户管理功能！');
            return;
        }

        adminModal.style.display = 'flex';

        // 只在第一次打开或数据为空时才加载
        if (!adminPanelLoaded || adminUsersTbody.children.length === 0) {
            await loadUsers();
            adminPanelLoaded = true;
        }

        // 设置定时刷新，每 2 秒更新一次在线状态
        if (adminPanelRefreshInterval) {
            clearInterval(adminPanelRefreshInterval);
        }
        adminPanelRefreshInterval = setInterval(() => {
            updateAdminPanelOnlineStatus();
        }, 2000);
    });

    // 关闭管理员面板
    closeAdminModal.addEventListener('click', () => {
        adminModal.style.display = 'none';

        // 清除定时刷新
        if (adminPanelRefreshInterval) {
            clearInterval(adminPanelRefreshInterval);
            adminPanelRefreshInterval = null;
        }
    });

    // 点击模态框外部关闭
    adminModal.addEventListener('click', (e) => {
        if (e.target === adminModal) {
            adminModal.style.display = 'none';

            // 清除定时刷新
            if (adminPanelRefreshInterval) {
                clearInterval(adminPanelRefreshInterval);
                adminPanelRefreshInterval = null;
            }
        }
    });

    // 加载用户列表
    async function loadUsers() {
        const token = localStorage.getItem('token') || '';
        console.log('加载用户列表，token:', token); // 调试信息
        console.log('当前 isAdmin:', isAdmin); // 调试信息

        try {
            const response = await fetch(`/admin/users?token=${token}`, {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' }
            });

            console.log('响应状态:', response.status); // 调试信息

            if (!response.ok) {
                const errorText = await response.text();
                console.error('服务器返回错误:', errorText); // 调试信息
                throw new Error('加载用户失败：' + errorText);
            }

            const users = await response.json();
            console.log('加载到的用户:', users); // 调试信息
            renderAdminUsers(users);

            // 加载完成后立即更新在线状态
            updateAdminPanelOnlineStatus();
        } catch (error) {
            console.error('loadUsers 错误:', error); // 调试信息
            // 只在非 403 错误时才显示错误提示
            if (!error.message.includes('403') && !error.message.includes('Admin privileges required')) {
                alert('加载用户列表失败：' + error);
            } else {
                console.error('权限验证失败，请重新登录');
                // 不要自动关闭面板，让用户能看到
                // adminModal.style.display = 'none';
                if (adminPanelRefreshInterval) {
                    clearInterval(adminPanelRefreshInterval);
                    adminPanelRefreshInterval = null;
                }
            }
        }
    }

    // 渲染管理员用户表格
    function renderAdminUsers(users) {
        adminUsersTbody.innerHTML = '';
        users.forEach(user => {
            const tr = document.createElement('tr');
            tr.style.borderBottom = '1px solid #dee2e6';
            const isOnline = onlineUsers.includes(user.username);
            tr.innerHTML = `
                <td style="padding: 12px;">${user.id}</td>
                <td style="padding: 12px; font-weight: bold;">${user.username}</td>
                <td style="padding: 12px;">${user.isAdmin ? '<span style="background: #ffc107; padding: 3px 8px; border-radius: 3px; font-size: 12px;">👑 管理员</span>' : '<span style="background: #6c757d; padding: 3px 8px; border-radius: 3px; font-size: 12px; color: white;">👤 用户</span>'}</td>
                <td style="padding: 12px;">${new Date(user.createdAt).toLocaleString('zh-CN')}</td>
                <td style="padding: 12px;">
                    <span style="color: ${isOnline ? '#28a745' : '#6c757d'}; font-weight: bold;">
                        ${isOnline ? '● 在线' : '○ 离线'}
                    </span>
                </td>
                <td style="padding: 12px;">
                    ${!user.isAdmin ? `<button onclick="deleteUser('${user.username}')" style="padding: 6px 12px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px;">删除</button>` : '<span style="color: #6c757d; font-size: 13px;">不可删除</span>'}
                </td>
            `;
            adminUsersTbody.appendChild(tr);
        });
    }

    // 删除用户
    async function deleteUser(username) {
        if (!confirm(`⚠️ 确定要删除用户 "${username}" 吗？\n\n这将同时删除该用户的所有消息记录，且无法恢复！`)) {
            return;
        }

        try {
            const token = localStorage.getItem('token') || '';
            const response = await fetch(`/admin/delete-user?token=${token}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username })
            });

            if (!response.ok) {
                throw new Error(await response.text());
            }

            alert(`✅ 用户 "${username}" 已成功删除`);

            // 重新加载用户列表
            await loadUsers();

            // 如果被删除的用户正在聊天，切换到群聊
            if (currentChatTarget === username) {
                selectChatTarget(null);
            }

            // 新增：从 allUsers 中移除被删除的用户
            const index = allUsers.indexOf(username);
            if (index > -1) {
                allUsers.splice(index, 1);
            }

            // 新增：清除与该用户相关的未读计数
            if (unreadCounts[username]) {
                delete unreadCounts[username];
            }

            // 新增：重新渲染用户列表，确保 UI 更新
            updateUserListDOM();

        } catch (error) {
            alert('删除用户失败：' + error);
        }
    }

    // 新增：请求通知权限
    if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }

    // 清空当前聊天记录功能
    clearChatBtn.addEventListener('click', () => {
        const chatName = currentChatTarget ? `与 ${currentChatTarget} 的聊天记录` : '群聊大厅的聊天记录';

        if (!confirm(`⚠️ 确定要清空${chatName}吗？\n\n此操作仅清空您的显示，不会影响其他用户的聊天记录。\n\n此操作无法恢复！`)) {
            return;
        }

        // 过滤掉当前聊天的消息（只保留系统消息）
        allMessages = allMessages.filter(msg => {
            // 保留系统消息
            if (msg.type === 'system') return true;

            // 如果是群聊，过滤掉所有广播消息
            if (currentChatTarget === null) {
                return msg.type !== 'broadcast';
            }

            // 如果是私聊，过滤掉与该用户相关的所有消息
            if (msg.type === 'private') {
                return !((msg.sender === currentUsername && msg.to === currentChatTarget) ||
                        (msg.sender === currentChatTarget && msg.to === currentUsername));
            }

            return true;
        });

        // 重新渲染消息列表
        renderMessages();

        showNotification('✅ 聊天记录已清空', 'success');
    });

    imageInput.addEventListener('change', (event) => {

    });

</script>
