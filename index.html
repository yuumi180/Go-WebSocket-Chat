<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Go WebSocket Chat</title>
    <style>
        /* 全局样式 */
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #71b7e6, #9b59b6);
        }

        /* 认证页面容器 */
        #auth-page {
            width: 360px;
            padding: 40px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #auth-page h2 {
            margin-bottom: 25px;
            color: #333;
            padding: 0;
            border: none;
            font-size: 24px;
        }
        #auth-page input[type="text"], #auth-page input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            height: auto;
            font-size: 14px;
        }
        #auth-page button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background-color: #9b59b6;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #auth-page button:hover {
            background-color: #8e44ad;
        }
        .toggle-form {
            color: #007bff;
            cursor: pointer;
            margin-top: 20px;
            display: inline-block;
            font-size: 14px;
        }
        .toggle-form:hover {
            text-decoration: underline;
        }

        /* 聊天主页面容器 */
        #chat-page {
            display: none;
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* 用户列表区域 */
        .user-list-container {
            width: 200px;
            border-right: 1px solid #eee;
            padding: 20px;
            background-color: #f8f9fa;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .user-list-container h2 {
            font-size: 18px;
            margin-top: 0;
            padding-bottom: 10px;
            color: #333;
            border-bottom: 1px solid #ddd;
        }
        #user-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        #user-list li {
            padding: 10px 5px;
            border-bottom: 1px solid #eee;
            color: #555;
            cursor: pointer;
            transition: background-color 0.2s;
            word-break: break-all;
            display: flex;
            align-items: center;
        }
        #user-list li:hover {
            background-color: #e9ecef;
        }
        #user-list li.active {
            background-color: #d4edda;
            font-weight: bold;
        }
        .status-dot {
            height: 8px;
            width: 8px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .status-dot.online {
            background-color: #28a745;
        }
        .status-dot.offline {
            background-color: #ccc;
        }

        /* 聊天区域 */
        .chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-container h2 {
            margin: 0;
            padding: 20px 20px 10px;
            border-bottom: 1px solid #eee;
            font-size: 20px;
        }
        #typing-indicator {
            height: 20px;
            padding: 0 20px;
            font-style: italic;
            color: #999;
            font-size: 12px;
        }
        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 15px;
            line-height: 1.4;
            max-width: 80%;
            display: flex;
            flex-direction: column;
        }
        .message .sender {
            font-weight: bold;
            color: #333;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .message .content-wrapper {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 18px;
            background-color: #f1f0f0;
            text-align: left;
            word-break: break-all;
            align-self: flex-start;
        }
        .message .timestamp {
            font-size: 10px;
            color: #aaa;
            margin-top: 4px;
        }
        .message .content-wrapper img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            display: block;
        }

        .system-message {
            color: #999; font-style: italic; text-align: center; font-size: 12px; width: 100%; max-width: 100%;
        }

        .my-message {
            align-items: flex-end; margin-left: auto;
        }
        .my-message .content-wrapper {
            background-color: #007bff; color: white; align-self: flex-end;
        }
        .my-message .sender { display: none; }

        #input-area {
            display: flex;
            padding: 15px;
            background-color: #f8f9fa;
            border-top: 1px solid #eee;
            align-items: center;
        }
        #message-input, #send-button {
            height: 40px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }
        #message-input {
            flex-grow: 1;
            margin-right: 10px;
            resize: none;
            padding: 0 10px;
        }
        #send-button {
            width: 80px;
            flex-shrink: 0;
            padding: 0;
            background-color: #9b59b6;
            color: #fff;
            border-color: #9b59b6;
        }
        #send-button:hover {
            background-color: #8e44ad;
        }
        .image-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            cursor: pointer;
            margin-right: 10px;
        }
        .image-upload-label svg {
            color: #555;
            transition: color 0.2s;
        }
        .image-upload-label:hover svg {
            color: #007bff;
        }
    </style>
</head>
<body>
<div id="auth-page">
    <div class="auth-container">
        <div id="login-form">
            <h2>登录</h2>
            <input type="text" id="login-username" placeholder="用户名" autocomplete="username">
            <input type="password" id="login-password" placeholder="密码" autocomplete="current-password">
            <button id="login-button">登录</button>
            <p>没有账号？ <span class="toggle-form" onclick="toggleForms()">立即注册</span></p>
        </div>
        <div id="register-form" style="display: none;">
            <h2>注册</h2>
            <input type="text" id="register-username" placeholder="用户名">
            <input type="password" id="register-password" placeholder="密码">
            <button id="register-button">注册</button>
            <p>已有账号？ <span class="toggle-form" onclick="toggleForms()">立即登录</span></p>
        </div>
    </div>
</div>
<div id="chat-page">
    <div class="user-list-container">
        <h2>在线用户</h2>
        <ul id="user-list"></ul>
    </div>
    <div class="chat-container">
        <h2 id="chat-title"></h2>
        <div id="typing-indicator" class="typing-indicator"></div>
        <div id="messages"></div>
        <div id="input-area">
            <label for="image-input" class="image-upload-label">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            </label>
            <input type="file" id="image-input" accept="image/*" style="display: none;">
            <input type="text" id="message-input" placeholder="输入消息...">
            <button id="send-button">发送</button>
        </div>
    </div>
</div>

<script>
    // --- DOM 元素获取 ---
    const authPage = document.getElementById('auth-page');
    const chatPage = document.getElementById('chat-page');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const loginBtn = document.getElementById('login-button');
    const registerBtn = document.getElementById('register-button');
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendButton = document.getElementById('send-button');
    const userListUl = document.getElementById('user-list');
    const chatTitle = document.getElementById('chat-title');
    const typingIndicator = document.getElementById('typing-indicator');
    const imageInput = document.getElementById('image-input');

    // --- 全局状态 ---
    let socket;
    let currentUsername;
    let currentChatTarget = null;
    let allUsers = [];
    let onlineUsers = [];
    let allMessages = [];
    let typingTimer;

    // --- 认证逻辑 ---
    function toggleForms() {
        loginForm.style.display = loginForm.style.display === 'none' ? 'block' : 'none';
        registerForm.style.display = registerForm.style.display === 'none' ? 'block' : 'none';
    }
    registerBtn.addEventListener('click', async () => {
        const user = document.getElementById('register-username').value;
        const pass = document.getElementById('register-password').value;
        if (!user || !pass) { alert('用户名和密码不能为空'); return; }
        try {
            const response = await fetch('/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: user, password: pass }) });
            if (response.status === 201) { alert('注册成功！请登录。'); toggleForms(); } else { alert('注册失败：' + await response.text()); }
        } catch (error) { alert('注册请求失败：' + error); }
    });
    loginBtn.addEventListener('click', async () => {
        const user = document.getElementById('login-username').value;
        const pass = document.getElementById('login-password').value;
        if (!user || !pass) { alert('用户名和密码不能为空'); return; }
        try {
            const response = await fetch('/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: user, password: pass }) });
            if (response.ok) {
                const data = await response.json();
                currentUsername = user;
                connectWebSocket(data.token);
            } else { alert('登录失败：' + await response.text()); }
        } catch (error) { alert('登录请求失败：' + error); }
    });

    // --- WebSocket 连接逻辑 ---
    function connectWebSocket(token) {
        authPage.style.display = 'none';
        chatPage.style.display = 'flex';
        allMessages = [];

        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsHost = window.location.host;
        socket = new WebSocket(`${wsProtocol}//${wsHost}/ws?token=${token}`);

        socket.onopen = () => {
            selectChatTarget(null);
            addMessageToCacheAndRender({ type: 'system', content: '成功连接到聊天室！', timestamp: new Date().toISOString() });
        };

        socket.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'user_list') {
                allUsers = msg.all_users || [];
                onlineUsers = msg.user_list || [];
                updateUserListDOM();
            } else if (msg.type === 'typing') {
                if (msg.sender === currentChatTarget) {
                    typingIndicator.textContent = `${msg.sender} 正在输入...`;
                }
            } else if (msg.type === 'stop_typing') {
                if (msg.sender === currentChatTarget) {
                    typingIndicator.textContent = '';
                }
            } else {
                if (msg.sender === currentChatTarget || (msg.type === 'private' && msg.to === currentUsername) || msg.type === 'broadcast' || msg.type === 'system') {
                    typingIndicator.textContent = '';
                }
                addMessageToCacheAndRender(msg);
            }
        };

        socket.onclose = () => {
            addMessageToCacheAndRender({ type: 'system', content: '连接已断开！', timestamp: new Date().toISOString() });
            setTimeout(() => {
                authPage.style.display = 'flex';
                chatPage.style.display = 'none';
                socket = null;
                allMessages = [];
                allUsers = [];
                onlineUsers = [];
                updateUserListDOM();
            }, 2000);
        };

        socket.onerror = (error) => {
            console.error('WebSocket Error:', error);
            addMessageToCacheAndRender({ type: 'system', content: '连接出错！', timestamp: new Date().toISOString() });
        };
    }

    // --- 消息发送与输入事件监听 ---
    sendButton.addEventListener('click', () => sendTextMessage());
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendTextMessage();
        }
    });
    messageInput.addEventListener('input', () => {
        if (currentChatTarget && socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ type: 'typing', to: currentChatTarget, sender: currentUsername }));
        }
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => {
            if (currentChatTarget && socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'stop_typing', to: currentChatTarget, sender: currentUsername }));
            }
        }, 1500);
    });
    imageInput.addEventListener('change', (event) => {
        const file = event.target.files[0];
        if (file && socket && socket.readyState === WebSocket.OPEN) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const message = {
                    type: currentChatTarget ? 'private' : 'broadcast',
                    to: currentChatTarget,
                    sender: currentUsername,
                    content: e.target.result,
                    contentType: 'image'
                };
                socket.send(JSON.stringify(message));
            };
            reader.readAsDataURL(file);
        }
        event.target.value = null;
    });

    function sendTextMessage() {
        const content = messageInput.value;
        if (content.trim()) {
            const message = {
                type: currentChatTarget ? 'private' : 'broadcast',
                to: currentChatTarget,
                sender: currentUsername,
                content: content,
                contentType: 'text'
            };
            socket.send(JSON.stringify(message));
            messageInput.value = '';
        }
    }

    // --- 核心渲染流程 ---
    function addMessageToCacheAndRender(msg) {
        allMessages.push(msg);
        renderMessages();
    }

    function renderMessages() {
        messagesDiv.innerHTML = '';
        const messagesToRender = allMessages.filter(msg => {
            if (msg.type === 'system') return true;
            if (currentChatTarget === null) {
                return msg.type === 'broadcast';
            } else {
                return msg.type === 'private' && ((msg.sender === currentUsername && msg.to === currentChatTarget) || (msg.to === currentUsername && msg.sender === currentChatTarget));
            }
        });
        messagesToRender.forEach(msg => addMessageToDOM(msg));
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addMessageToDOM(msg) {
        const msgElement = document.createElement('div');
        msgElement.classList.add('message');
        let timeString = '';
        if (msg.timestamp) {
            const date = new Date(msg.timestamp);
            timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        if (msg.type === 'system') {
            msgElement.classList.add('system-message');
            msgElement.textContent = `[系统消息]: ${msg.content} (${timeString})`;
        } else {
            if (msg.sender === currentUsername) { msgElement.classList.add('my-message'); }
            let senderText = msg.sender;
            if (msg.type === 'private') { senderText += (msg.sender === currentUsername) ? ` (私信 to ${msg.to})` : ' (私信)'; }

            let contentHTML = '';
            if (msg.contentType === 'image') {
                contentHTML = `<img src="${msg.content}" alt="Image from ${msg.sender}">`;
            } else {
                contentHTML = `<span>${msg.content}</span>`;
            }

            msgElement.innerHTML = `
                <div class="sender">${senderText}</div>
                <div class="content-wrapper">${contentHTML}</div>
                <div class="timestamp">${timeString}</div>
            `;
        }
        messagesDiv.appendChild(msgElement);
    }

    function updateUserListDOM() {
        userListUl.innerHTML = '';
        const groupChatElement = document.createElement('li');
        groupChatElement.textContent = '群聊大厅';
        groupChatElement.onclick = () => selectChatTarget(null);
        userListUl.appendChild(groupChatElement);
        const onlineUserSet = new Set(onlineUsers);
        allUsers.sort();
        allUsers.forEach(user => {
            if (user === currentUsername) return;
            const userElement = document.createElement('li');
            userElement.onclick = () => selectChatTarget(user);
            const statusDot = document.createElement('span');
            statusDot.classList.add('status-dot');
            if (onlineUserSet.has(user)) {
                statusDot.classList.add('online');
            } else {
                statusDot.classList.add('offline');
            }
            const userNameText = document.createTextNode(user);
            userElement.appendChild(statusDot);
            userElement.appendChild(userNameText);
            userListUl.appendChild(userElement);
        });
        highlightCurrentChat();
    }

    function selectChatTarget(target) {
        currentChatTarget = target;
        chatTitle.textContent = target ? `与 ${target} 私聊中` : '群聊大厅';
        typingIndicator.textContent = '';
        highlightCurrentChat();
        renderMessages();
    }

    function highlightCurrentChat() {
        document.querySelectorAll('#user-list li').forEach(li => {
            li.classList.remove('active');
            if ((currentChatTarget === null && li.textContent === '群聊大厅') || (li.textContent.endsWith(currentChatTarget))) {
                li.classList.add('active');
            }
        });
    }
</script>

</body>
</html>
